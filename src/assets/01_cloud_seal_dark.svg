<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 330 110" width="330" height="110" role="img" aria-label="Secured by Axiler — protection live">
  <image width="330" height="110" preserveAspectRatio="xMidYMid meet" xlink:href="data:image/png;base64,"/>

  <style>
    @keyframes axiler-live-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.9; }
    }
    @keyframes axiler-live-ring {
      0% { transform: scale(0.85); opacity: 0.75; }
      100% { transform: scale(1.9); opacity: 0; }
    }
    .axiler-live-dot-wrap { transform-origin: center; transform-box: fill-box; }
    .axiler-live-dot {
      transform-origin: center;
      transform-box: fill-box;
      animation: axiler-live-pulse 1.6s ease-in-out infinite;
    }
    .axiler-live-ring {
      transform-origin: center;
      transform-box: fill-box;
      animation: axiler-live-ring 1.6s ease-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .axiler-live-dot, .axiler-live-ring { animation: none; }
    }
  </style>
  <g class="axiler-live-pill" transform="translate(286, 55)">
    <g class="axiler-live-dot-wrap">
      <circle class="axiler-live-ring" r="9" fill="none" stroke="rgba(163,255,91,0.4)" stroke-width="1.25"/>
      <circle r="10" fill="none" stroke="rgba(163,255,91,0.28)" stroke-width="1"/>
      <circle class="axiler-live-dot" r="4" fill="#a3ff5b"/>
    </g>
    <text x="0" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="600" letter-spacing="2.4" fill="#98c9ff">LIVE</text>
  </g>
</svg>